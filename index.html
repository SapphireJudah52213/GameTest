<!DOCTYPE html>
<html>
  <head>
    <style>
      .block {
        height: 80px;
        width: 80px;
        background: green;
        position: absolute;
      }
    </style>
  </head>
  <body>
    <div id="block" class="block"></div>
    <script>
      const block = document.getElementById('block')
      block.style.top = "1000px";
      document.addEventListener('click', (e)=> {
        for (let i = 0; i < 8; i++) {
          setTimeout(()=> {
            block.style.top = (parseInt(block.style.top) - 20) + "px";
          },20 * i)
        }
        setTimeout(()=> {
         for (let i = 0; i < 8; i++) {
          setTimeout(()=> {
            block.style.top = (parseInt(block.style.top) + 20) + "px";
          },10 * i)
         }
        }, 20)
        })
    </script>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <style>
      .block {
        height: 80px;
        width: 80px;
        background: green;
        position: absolute;
      }
      @keyframes rotate{
        from {transform: rotate(0deg)} to {transform: rotate(90deg)}}
    </style>
  </head>
  <body>
    <div id="block" class="block">hi</div>
    <script>
      const block = document.getElementById('block')
      block.style.top = "1000px";
      block.style.tranform = "rotate(0deg)"
      document.addEventListener('click', (e)=> {
        block.style.animation = "rotate 1s 1";
        for (let i = 0; i < 8; i++) {
          setTimeout(()=> {
            block.style.top = (parseInt(block.style.top) - 20) + "px";
          },10 * i)
        }
        setTimeout(()=> {
         for (let i = 0; i < 8; i++) {
          setTimeout(()=> {
            block.style.top = (parseInt(block.style.top) + 20) + "px";
          },8 * i)
         }
        }, 165)
        block.style.transform = "rotate(" + (parseInt(block.style.transform) + 90) + "deg)"
        block.style.animation = "none";
      })
      
    </script>
  </body>
</html>

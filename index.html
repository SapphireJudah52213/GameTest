<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
        background: black;
        overflow: scroll;
      }
      .block {
        height: 80px;
        width: 80px;
        background: green;
        position: absolute;
      }
      .background {
        background-image: url(./56CCAB10-EBC7-468A-9B3C-1AB67EC58110.png)
        height: 200px;
        width: 20000px;
        position: unset;
      }
      .spike {
        top: 1000px;
        height: 60px;
        width: 40px;
         background: rgb(100, 100, 100);
      }
      @keyframes rotate{
        from {transform: rotate(0deg)} to {transform: rotate(90deg)}}
    </style>
  </head>
  <body>
    <div id="background" class="background"></div>
    <div id="block" class="block">hi</div>
    <div id="spike" class="spike" style="left: 10%;"></div>
    <script>
      let rotation = 0
      const block = document.getElementById('block')
      const bg = document.getElementById('background')
      block.style.top = "180px";
      bg.style.marginLeft = "0px";
      block.style.transform = "rotate(0deg)"
      document.addEventListener('click', (e)=> {
        block.style.animation = "rotate 30ms 1";
        for (let i = 0; i < 8; i++) {
          setTimeout(()=> {
            block.style.top = (parseInt(block.style.top) - 20) + "px";
          },10 * i)
        }
        setTimeout(()=> {
         for (let i = 0; i < 8; i++) {
          setTimeout(()=> {
            block.style.top = (parseInt(block.style.top) + 20) + "px";
          },8 * i)
         }
        }, 165)
        
        for (let i = 0; i < 90; i++) {
          setTimeout(()=> {
            block.style.transform = "rotate(" + rotation + "deg)"
            rotation ++;
          }, 2 * i)
        }
        /*setTimeout(()=> {block.style.animation = "none";
                        block.style.transform = "rotate(" + (rotation + 90) + "deg)"
                        }, 40)*/
      })

      setTimeout(()=> {
        for (let i = 0; i<2000; i++) {
         setTimeout(()=> {
          bg.style.marginLeft = (parseInt(bg.style.marginLeft) - 10) + "px";
         }, 10 * i);
        }
      }, 1000);
      
    </script>
  </body>
</html>

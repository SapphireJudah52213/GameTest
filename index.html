<!DOCTYPE html>
<html>
  <head>
    <style>
      .block {
        height: 40px;
        width: 40px;
        background: green;
        position: absolute;
      }
    </style>
  </head>
  <body>
    <div id="block" class="block"></div>
    <script>
      const block = document.getElementById('block')
      block.style.top = "90px";
      document.addEventListener('click', (e)=> {
        for (let i = 0; i < 5; i++) {
          block.style.top = (parseInt(block.style.top) - 10) + "px";
        }
        })
    </script>
  </body>
</html>

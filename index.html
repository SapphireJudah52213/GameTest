<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }

    .background {
      position: relative;
      height: 534px;
      width: 20000px;
      background-image: url('./56CCAB10-EBC7-468A-9B3C-1AB67EC58110.jpeg');
      
    }

    .block {
      position: absolute;
      height: 60px;
      width: 60px;
      background-image: url('IMG_5192.png');
      background-size: cover;
      left: 100px;
      top: 300px;
    }

    .spike {
      position: absolute;
      height: 60px;
      width: 60px;
      background-image: url('./IMG_5201.PNG');
      background-size: cover;
      top: 330px;
    }
  </style>
</head>

<body>
  <div id="background" class="background">
    <div class="spike" style="left: 500px;"></div>
    <div class="spike" style="left: 900px;"></div>
    <div class="spike" style="left: 1300px;"></div>
    <div class="spike" style="left: 1500px;"></div>
    <div class="spike" style="left: 1900px;"></div>
    <div class="spike" style="left: 2300px;"></div>
  </div>

  <div id="block" class="block"></div>

  <script>
    const block = document.getElementById("block");
    const bg = document.getElementById("background");
    const spikes = document.getElementsByClassName("spike");

    let y = 300;
    let velocity = 0;
    let gravity = 0.8;
    let jumpPower = -18;

    let bgX = 0;
    let speed = 5;

    let rotation = 0;
    let done = false;

    // Jump input
    function jump() {
      if (y >= 300) { // only jump if on ground
        velocity = jumpPower;
      }
    }

    document.addEventListener("click", jump);
    document.addEventListener("keydown", (e) => {
      if (e.code === "Space") jump();
    });

    function gameLoop() {
      if (done) return;

      // Gravity
      velocity += gravity;
      y += velocity;

      // Ground collision
      if (y > 300) {
        y = 300;
        velocity = 0;
        rotation = 0;
      } else {
        rotation += 6;
      }

      block.style.top = y + "px";
      block.style.transform = `rotate(${rotation}deg)`;

      // Move background
      bgX -= speed;
      bg.style.transform = `translateX(${bgX}px)`;

      // Collision detection
      for (let spike of spikes) {
        if (isTouching(block, spike)) {
          done = true;
          alert("Game Over!");
        }
      }

      requestAnimationFrame(gameLoop);
    }

    function isTouching(a, b) {
      const r1 = a.getBoundingClientRect();
      const r2 = b.getBoundingClientRect();

      return !(
        r1.right < r2.left - 20 ||
        r1.left > r2.right - 5 ||
        r1.bottom < r2.top - 5 ||
        r1.top > r2.bottom - 5
      );
    }

    gameLoop();
  </script>
</body>
</html>

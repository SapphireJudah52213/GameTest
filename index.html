<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
        background: black;
        overflow: hidden;
      }
      .block {
        height: 80px;
        width: 80px;
        background-image: url('IMG_5192.png');
        position: absolute;
        background-size: cover;
      }
      .background {
        background-image: url('./56CCAB10-EBC7-468A-9B3C-1AB67EC58110.jpeg');
        height: 534px;
        width: 20000px;
        position: unset;
      }
      .spike {
        top: 305px;
        height: 60px;
        width: 60px;
         background-image: url('./IMG_5201.PNG');
        background-size: cover;
        position: relative;
      }
      @keyframes rotate{
        from {transform: rotate(0deg)} to {transform: rotate(90deg)}}
    </style>
  </head>
  <body>
    <div id="background" class="background">
      <div id="spike" class="spike" style="left: 10%;"></div>
      <div id="spike" class="spike" style="left: 30%;"></div>
    </div>
    <div id="block" class="block"></div>
    
    <script>
      let rotation = 0
      const block = document.getElementById('block')
      const bg = document.getElementById('background')
      block.style.top = "305px";
      bg.style.marginLeft = "0px";
      block.style.transform = "rotate(0deg)"
      let speed = 10;
      document.addEventListener('click', (e)=> {
        block.style.animation = "rotate 30ms 1";
        for (let i = 0; i < 8; i++) {
          setTimeout(()=> {
            block.style.top = (parseInt(block.style.top) - 20) + "px";
            speed = 10;
          },10 * i)
        }
        setTimeout(()=> {
          speed = 10;
         for (let i = 0; i < 8; i++) {
          setTimeout(()=> {
            block.style.top = (parseInt(block.style.top) + 20) + "px";
            //speed = 20;
          },8 * i)
         }
        }, 655)
        
        for (let i = 0; i < 90; i++) {
          setTimeout(()=> {
            block.style.transform = "rotate(" + rotation + "deg)"
            rotation ++;
          }, 7.28 * i)
        }
        /*setTimeout(()=> {block.style.animation = "none";
                        block.style.transform = "rotate(" + (rotation + 90) + "deg)"
                        }, 40)*/
      })

      document.addEventListener('keydown', (e)=> {
       if (e.key === " ") {
        block.style.animation = "rotate 30ms 1";
        for (let i = 0; i < 8; i++) {
          setTimeout(()=> {
            block.style.top = (parseInt(block.style.top) - 20) + "px";
            speed = 10;
          },15 * i)
        }
        setTimeout(()=> {
          speed = 10;
         for (let i = 0; i < 8; i++) {
          setTimeout(()=> {
            block.style.top = (parseInt(block.style.top) + 20) + "px";
          },15 * i)
         }
        }, 655)
        
        for (let i = 0; i < 90; i++) {
          setTimeout(()=> {
            block.style.transform = "rotate(" + rotation + "deg)"
            rotation ++;
          }, 7.28 * i)
        }
        /*setTimeout(()=> {block.style.animation = "none";
                        block.style.transform = "rotate(" + (rotation + 90) + "deg)"
                        }, 40)*/
       }
      })

      let done = false;
      
      setTimeout(()=> {
        for (let i = 0; i<20000; i++) {
         setTimeout(()=> {
          if (!done) {bg.style.marginLeft = (parseInt(bg.style.marginLeft) - 1) + "px";}
         }, 5 * i);
        }
        setTimeout(() => {
          done = true;
        }, 40000)
      }, 2000);
      let counter = 0;
      
      function start() {
        if (!done) {
          counter ++;
        setTimeout(()=> {
        el = document.getElementsByClassName('spike');
        for (let i = 0; i < el.length; i ++) {
          if (isTouching(block, el.item(i))) {done = true;console.log("finished!");}
        }
        }, 100 * counter);
          requestAnimationFrame(start);
      }
        
      }
      

      function isTouching(a, b) {
        const r1 = a.getBoundingClientRect();
        const r2 = b.getBoundingClientRect();

        return !(
          r1.right < r2.left ||
          r1.left > r2.right ||
          r1.bottom < r2.top ||
          r1.top > r2.bottom
        );
      }
      
    </script>
  </body>
</html>
